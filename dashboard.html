<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="가계부" />
<meta name="theme-color" content="#0b0b0f" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon.png" />
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<title>우리 가계부</title>
<style>
  :root {
    --bg: #0b0b0f; --card: #16161d; --card2: #1e1e27;
    --txt: #f2f2f5; --dim: #8a8a96; --line: #2a2a35;
    --accent: #6c8cff; --plus: #ff6b6b; --minus: #5ad19a;
    --bar: #6c8cff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; }
  body { padding: max(env(safe-area-inset-top), 16px) 16px calc(env(safe-area-inset-bottom) + 80px); max-width: 560px; margin: 0 auto; }
  h1, h2, h3 { margin: 0; font-weight: 700; }
  .hidden { display: none !important; }

  /* 로그인 */
  #login { min-height: 70vh; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
  #login h1 { font-size: 22px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .logo-lg { width: 30px; height: 30px; border-radius: 8px; }
  .logo { width: 22px; height: 22px; border-radius: 6px; vertical-align: middle; }
  .apptitle { display: inline-flex; align-items: center; gap: 7px; }
  #login p { color: var(--dim); text-align: center; margin: 0; font-size: 14px; }
  #login input { background: var(--card); border: 1px solid var(--line); color: var(--txt);
    padding: 14px; border-radius: 12px; font-size: 16px; }
  #login button { background: var(--accent); color: #fff; border: 0; padding: 14px;
    border-radius: 12px; font-size: 16px; font-weight: 700; }
  #loginErr { color: var(--plus); font-size: 13px; text-align: center; min-height: 18px; }

  /* 월 네비 */
  .monthnav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .monthnav button { background: var(--card); border: 1px solid var(--line); color: var(--txt);
    width: 40px; height: 40px; border-radius: 12px; font-size: 18px; }
  .monthnav h2 { font-size: 18px; display: flex; flex-direction: column; align-items: center; }
  .mrange { font-size: 11px; color: var(--dim); font-weight: 500; margin-top: 2px; }
  .cdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  /* 총지출 카드 */
  .total { background: var(--card); border-radius: 18px; padding: 22px; text-align: center; margin-bottom: 14px; }
  .total .label { color: var(--dim); font-size: 13px; }
  .total .amount { font-size: 38px; font-weight: 800; margin: 6px 0; letter-spacing: -0.5px; }
  .total .compare { font-size: 13px; color: var(--dim); }
  .total .compare .up { color: var(--plus); }
  .total .compare .down { color: var(--minus); }

  /* 섹션 */
  .section { background: var(--card); border-radius: 18px; padding: 16px 16px 6px; margin-bottom: 14px; }
  .section h3 { font-size: 14px; color: var(--dim); margin-bottom: 12px; }

  /* 집계 카드 — 겹쳐 쌓인 스택 */
  .deck { position: relative; margin-bottom: 34px; touch-action: pan-y; }
  .bdcard { position: absolute; top: 0; left: 0; right: 0; margin: 0; padding-bottom: 18px;
    transition: transform .22s ease; will-change: transform; }
  .bdcard.front { position: relative; z-index: 10; box-shadow: 0 6px 18px rgba(0,0,0,.4); } /* 앞 카드: 흐름배치+그림자 */
  .bdhead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .bdtitle { font-size: 14px; color: var(--dim); font-weight: 700; }
  .ftog { display: inline-flex; align-items: center; gap: 4px; background: var(--card2); border: 1px solid var(--line);
    color: var(--dim); padding: 5px 11px; border-radius: 9px; font-size: 12px; font-weight: 600; }
  .ftog.act { color: var(--accent); border-color: var(--accent); }
  .ftog.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); transition: background .15s; }
  .dot.on { background: var(--accent); width: 18px; border-radius: 3px; }
  /* 필터 표시 (총합 아래) */
  .amt-sub { font-size: 19px; font-weight: 600; color: var(--dim); }
  .frow { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 6px; }
  .fchip { background: var(--accent); color: #fff; border: 0; padding: 4px 10px; border-radius: 9px;
    font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
  .fchip iconify-icon { font-size: 13px; }

  /* 카테고리 막대 */
  .cat { margin-bottom: 12px; }
  .cat.dim { opacity: .38; }
  .cat.fm { margin-bottom: 8px; }
  .cat.fm .amt { display: inline-flex; align-items: center; gap: 8px; }
  .cat .row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
  .cat .row .name { font-weight: 600; }
  .cat .row .amt { color: var(--dim); }
  .cat .track { height: 8px; background: var(--card2); border-radius: 6px; overflow: hidden; }
  .cat .fill { height: 100%; background: var(--bar); border-radius: 6px; }
  .cat .row { margin-bottom: 4px; }
  .cat .chip { font-size: 13px; height: 27px; padding: 0 11px; }
  .cat .chip iconify-icon { font-size: 15px; }

  /* 거래 리스트 */
  .day { color: var(--dim); font-size: 12px; margin: 14px 0 6px; }
  .tx { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-top: 1px solid var(--line); }
  .tx:first-of-type { border-top: 0; }
  .tx .left .m { font-size: 15px; font-weight: 600; }
  .tx .left .meta { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .tx .amt { font-size: 15px; font-weight: 700; }
  .tx.cancel .m, .tx.cancel .amt { text-decoration: line-through; color: var(--dim); }
  .tx .amt.refund { color: var(--minus); }
  .empty { text-align: center; color: var(--dim); padding: 30px 0; font-size: 14px; }

  .updated { text-align: center; color: var(--dim); font-size: 11px; margin-top: 6px; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 8px; background: var(--card2); color: var(--dim); margin-left: 6px; }

  /* 직접입력 FAB */
  .fab { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(env(safe-area-inset-bottom) + 18px);
    background: var(--accent); color: #fff; border: 0; padding: 14px 26px; border-radius: 30px;
    font-size: 16px; font-weight: 700; box-shadow: 0 6px 20px rgba(108,140,255,.4); z-index: 40; }

  /* 모달 */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 30; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--card); width: 100%; max-width: 560px; border-radius: 20px 20px 0 0;
    padding: 20px 18px calc(env(safe-area-inset-bottom) + 20px); }
  .modal h3 { font-size: 17px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--card2); border: 1px solid var(--line);
    color: var(--txt); padding: 12px; border-radius: 10px; font-size: 16px; }
  .seg { display: flex; gap: 8px; }
  .seg button { flex: 1; background: var(--card2); border: 1px solid var(--line); color: var(--dim);
    padding: 11px; border-radius: 10px; font-size: 14px; }
  .seg button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal .actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal .actions button { flex: 1; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; border: 0; }
  .btn-cancel { background: var(--card2); color: var(--txt); }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-del { background: #3a1f24; color: var(--plus); }
  .mhead { background: var(--card2); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  .mhead .mh-m { font-size: 16px; font-weight: 700; }
  .mhead .mh-a { font-size: 13px; color: var(--dim); margin-top: 3px; }
  .tx { cursor: pointer; }
  .chiprow { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  /* 모든 칩 동일 높이/폰트 */
  .chip { display: inline-flex; align-items: center; gap: 3px; height: 24px; padding: 0 9px;
    font-size: 12px; line-height: 1; border-radius: 9px; background: var(--card2); white-space: nowrap;
    border: 1px solid currentColor; border-color: color-mix(in srgb, currentColor 42%, transparent); }
  .chip .emo { font-size: 12px; }
  iconify-icon { vertical-align: -0.125em; }
  .chip iconify-icon { font-size: 13px; }
  .srow iconify-icon { margin-right: 7px; vertical-align: -0.15em; opacity: .85; }
  .cat .row .name iconify-icon { vertical-align: -0.15em; margin-right: 3px; }
  .gear iconify-icon, .iconbtn iconify-icon { font-size: 18px; vertical-align: -0.2em; }
  .fab iconify-icon { vertical-align: -0.12em; }
  .vrow .vicon { width: 130px; }
  .chip.cat { color: var(--accent); }
  .chip.use { color: #e0c060; }
  .chip.use.together { color: #6ad1a0; }
  .chip.payer { color: #d08cff; }
  .chip.tag { color: #9aa3b2; }
  /* 토글 가능한 칩 = 버튼처럼 (테두리 + ⇄) */
  .chip.toggle { cursor: pointer; font-weight: 600; border-color: currentColor; }
  .chip.toggle .sw2 { opacity: .55; font-size: 11px; margin-left: 1px; }
  .total .split { font-size: 12px; color: var(--dim); margin-top: 8px; }

  /* 상단바 + 설정 */
  .apptop { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .apptop .apptitle { font-size: 16px; font-weight: 700; }
  .gear { background: var(--card); border: 1px solid var(--line); color: var(--txt);
    width: 38px; height: 38px; border-radius: 12px; font-size: 16px; }
  .hint { color: var(--dim); font-size: 12px; margin: -8px 0 14px; }
  .btn-add { width: 100%; background: var(--card2); color: var(--accent); border: 1px dashed var(--line);
    padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .axis-edit { background: var(--card2); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .axis-edit .arow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .axis-edit .arow:last-child { margin-bottom: 0; }
  .axis-edit input, .axis-edit select { flex: 1; background: var(--card); border: 1px solid var(--line);
    color: var(--txt); padding: 9px; border-radius: 8px; font-size: 14px; min-width: 0; }
  .axis-edit .alabel { font-size: 11px; color: var(--dim); width: 44px; flex: none; }
  .axis-edit .axdel { background: none; border: 0; color: var(--plus); font-size: 18px; flex: none; width: 28px; }
  .axis-edit .locked { color: var(--dim); font-size: 11px; }

  /* 설정 헤더/메뉴/스위치 */
  .shead { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .shead h3 { flex: 1; margin: 0; font-size: 18px; }
  .iconbtn { background: var(--card2); border: 1px solid var(--line); color: var(--txt);
    width: 34px; height: 34px; border-radius: 10px; font-size: 16px; flex: none; }
  .slist { display: flex; flex-direction: column; gap: 9px; }
  .srow { display: flex; align-items: center; justify-content: space-between; width: 100%;
    background: var(--card2); border: 1px solid var(--line); color: var(--txt);
    padding: 15px 16px; border-radius: 13px; font-size: 15px; text-align: left; }
  .srow .chev { color: var(--dim); font-size: 18px; }
  .sw { width: 46px; height: 28px; border-radius: 14px; background: var(--line); position: relative; flex: none; transition: background .15s; cursor: pointer; }
  .sw::after { content: ""; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: left .15s; }
  .sw.on { background: var(--minus); }
  .sw.on::after { left: 21px; }
  /* 값 편집(이름·아이콘·색) */
  .vlabel { font-size: 11px; color: var(--dim); margin: 4px 0 6px; }
  .vrow { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .vrow .vname { flex: 1; min-width: 0; background: var(--card); border: 1px solid var(--line); color: var(--txt); padding: 9px; border-radius: 8px; font-size: 14px; }
  .vrow .vicon { width: 46px; flex: none; text-align: center; background: var(--card); border: 1px solid var(--line); color: var(--txt); padding: 9px 4px; border-radius: 8px; font-size: 16px; }
  .vrow .vcolor { width: 38px; height: 38px; flex: none; padding: 0; border: 1px solid var(--line); border-radius: 8px; background: var(--card); }
  .btn-addv { background: none; border: 0; color: var(--accent); font-size: 13px; padding: 2px 0 8px; }
</style>
</head>
<body>

<div id="login">
  <h1><img src="/icon.png" class="logo-lg" alt="" /> 우리 가계부</h1>
  <p>접속 암호를 입력하세요</p>
  <input id="pw" type="password" inputmode="text" placeholder="암호" autocomplete="current-password" />
  <button id="loginBtn">들어가기</button>
  <div id="loginErr"></div>
</div>

<div id="app" class="hidden">
  <div class="apptop">
    <span class="apptitle"><img src="/icon.png" class="logo" alt="" /> 우리 가계부</span>
    <button id="settingsBtn" class="gear" title="설정"><iconify-icon icon="lucide:settings"></iconify-icon></button>
  </div>
  <div class="monthnav">
    <button id="prev">‹</button>
    <h2 id="monthLabel">—</h2>
    <button id="next">›</button>
  </div>

  <div class="total">
    <div class="label">이번 달 총 지출</div>
    <div class="amount" id="totalAmount">—</div>
    <div class="compare" id="compare"></div>
  </div>

  <div id="bdDeck" class="deck"></div>
  <div id="bdDots" class="dots"></div>

  <div class="section">
    <h3>거래 내역</h3>
    <div id="txList"></div>
  </div>

  <div class="updated" id="updated"></div>
</div>

<button id="fab" class="fab hidden"><iconify-icon icon="lucide:plus"></iconify-icon> 직접 입력</button>

<div id="modal" class="modal-bg hidden">
  <div class="modal">
    <h3 id="mTitle">직접 입력</h3>
    <div id="mHeader" class="mhead hidden"></div>
    <div id="addFields">
      <div class="field">
        <label>구분</label>
        <div class="seg" id="segType">
          <button data-v="승인" class="on">지출</button>
          <button data-v="취소">환불</button>
        </div>
      </div>
      <div class="field"><label>가맹점 / 내용</label><input id="mMerchant" placeholder="예: 현금 점심" /></div>
      <div class="field"><label>금액 (원)</label><input id="mAmount" type="number" inputmode="numeric" placeholder="0" /></div>
      <div class="field"><label>날짜 / 시각</label><input id="mWhen" type="datetime-local" /></div>
    </div>
    <div id="tagControls"></div>
    <div class="field"><label>메모 (선택)</label><input id="mMemo" placeholder="둘이 정리할 메모" /></div>
    <div class="actions">
      <button class="btn-cancel" id="mCancel">취소</button>
      <button class="btn-del hidden" id="mDelete">삭제</button>
      <button class="btn-save" id="mSave">저장</button>
    </div>
  </div>
</div>

<div id="settings" class="modal-bg hidden">
  <div class="modal">
    <div class="shead">
      <button id="sBack" class="iconbtn hidden"><iconify-icon icon="lucide:chevron-left"></iconify-icon></button>
      <h3 id="sTitle">설정</h3>
      <button id="sClose" class="iconbtn"><iconify-icon icon="lucide:x"></iconify-icon></button>
    </div>
    <div id="settingsBody"></div>
  </div>
</div>

<script>
const fmt = (n) => n.toLocaleString("ko-KR") + "원";
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
let TOKEN = localStorage.getItem("token") || "";
let ALL = [];           // 전체 거래
let cursor = null;      // {y, m} 보고 있는 달 (0-based month)
let TAGDIMS = [];       // 태그 축 정의 (서버 /api/config)
let deckActive = 0;             // 스택에서 앞에 있는 카드 인덱스
let filters = {};               // 필터 {axisKey: [포함값,...]} (축 내 OR, 축 간 AND). 키 없으면 전체
let filterModeAxis = null;      // 필터 토글 모드인 카드의 축 key (null=없음)
// 스택: 활성 카드는 일반 흐름(높이 자동), 나머지는 절대배치로 아래로 밀어 바닥 가장자리만 peek
function layoutDeck() {
  const deck = document.getElementById("bdDeck"), cards = deck.children;
  if (!cards.length) return;
  deckActive = Math.max(0, Math.min(deckActive, cards.length - 1));
  for (let i = 0; i < cards.length; i++) {
    const ad = Math.abs(i - deckActive), c = cards[i];
    c.style.opacity = "1"; // 흐림 없음 — 그냥 겹친 박스
    if (ad === 0) {
      c.classList.add("front");
      c.style.transform = ""; c.style.zIndex = "10"; c.style.pointerEvents = "auto";
    } else {
      c.classList.remove("front");
      c.style.transform = `translateY(${ad * 14}px)`; // 바닥 가장자리만 살짝 peek
      c.style.zIndex = String(10 - ad);
      c.style.pointerEvents = "none";
    }
  }
  const dots = document.getElementById("bdDots").children;
  for (let i = 0; i < dots.length; i++) dots[i].classList.toggle("on", i === deckActive);
}
let APPCFG = { monthStartDay: 1, cards: [] }; // 앱 설정
let chipVis = JSON.parse(localStorage.getItem("chipVis") || "{}"); // {key:false}=숨김 (기기별)
function visibleDims() { return TAGDIMS.filter((d) => chipVis[d.key] !== false); }
function cardOf(tx) { return (APPCFG.cards || []).find((c) => c.match && tx.cardName === c.match); }

// 카테고리 기본 아이콘 (Lucide 셋, Iconify)
const catIcon = { "편의점": "lucide:store", "카페/간식": "lucide:coffee", "쇼핑": "lucide:shopping-bag",
  "식비": "lucide:utensils", "교통": "lucide:car-front", "통신/구독": "lucide:smartphone",
  "의료": "lucide:pill", "미분류": "lucide:circle-help", "기타": "lucide:tag" };
// 아이콘 문자열 → HTML. "set:name" 형태면 Iconify, 아니면 이모지/텍스트.
function iconHTML(icon) {
  if (!icon) return "";
  if (/^[a-z0-9-]+:[a-z0-9-]+$/i.test(icon)) return `<iconify-icon icon="${esc(icon)}"></iconify-icon>`;
  return `<span class="emo">${esc(icon)}</span>`;
}
const dimByKey = (k) => TAGDIMS.find((d) => d.key === k);
async function fetchConfig() {
  const r = await fetch("/api/config?token=" + encodeURIComponent(TOKEN));
  if (r.ok) { const j = await r.json(); TAGDIMS = j.tagDims || []; if (j.settings) APPCFG = j.settings; }
}

// ---- KST 기준 날짜 헬퍼 (서버 when 은 UTC ISO) ----
function kst(d) { return new Date(new Date(d).getTime() + 9 * 3600 * 1000); }
function ym(d) {
  const k = kst(d); let y = k.getUTCFullYear(), m = k.getUTCMonth();
  const D = APPCFG.monthStartDay || 1;
  if (k.getUTCDate() < D) { m--; if (m < 0) { m = 11; y--; } } // 시작일 전이면 직전 기간
  return { y, m };
}

async function fetchData() {
  const r = await fetch("/api/transactions?token=" + encodeURIComponent(TOKEN));
  if (r.status === 401) throw new Error("unauthorized");
  const j = await r.json();
  ALL = j.rows || [];
}

function signedAmount(tx) { return tx.status === "취소" ? -tx.amount : tx.amount; }

function render() {
  const { y, m } = cursor;
  const D = APPCFG.monthStartDay || 1;
  let label = `${y}년 ${m + 1}월`;
  if (D > 1) {
    const end = new Date(Date.UTC(y, m + 1, D - 1));
    label += `<span class="mrange">${m + 1}/${D} ~ ${end.getUTCMonth() + 1}/${end.getUTCDate()}</span>`;
  }
  document.getElementById("monthLabel").innerHTML = label;

  const inMonth = ALL.filter((t) => { const a = ym(t.when); return a.y === y && a.m === m; });

  // 필터(태그값) — {axisKey: [포함값,...]}, 축 내 OR · 축 간 AND
  const fKeys = Object.keys(filters).filter((k) => Array.isArray(filters[k]) && TAGDIMS.some((d) => d.key === k));
  const matchF = (t, except) => fKeys.every((k) => k === except || (t.tags && filters[k].includes(t.tags[k])));
  const filtered = inMonth.filter((t) => matchF(t, null));

  const totalAll = inMonth.reduce((s, t) => s + signedAmount(t), 0);
  const thisTotal = fKeys.length ? filtered.reduce((s, t) => s + signedAmount(t), 0) : totalAll;
  document.getElementById("totalAmount").innerHTML =
    fmt(thisTotal) + (fKeys.length ? ` <span class="amt-sub">/ ${fmt(totalAll)}</span>` : "");

  // 지난달 대비 (필터 동일 적용)
  const pm = m === 0 ? { y: y - 1, m: 11 } : { y, m: m - 1 };
  const prevTotal = ALL.filter((t) => { const a = ym(t.when); return a.y === pm.y && a.m === pm.m && matchF(t, null); }).reduce((s, t) => s + signedAmount(t), 0);
  const cmp = document.getElementById("compare");
  let chtml = "";
  if (fKeys.length) {
    chtml += `<div class="frow">` + fKeys.map((k) => { const d = dimByKey(k); return `<button class="fchip" data-fx="${esc(k)}">${esc(d ? d.label : k)}: ${esc(filters[k].join(", ") || "없음")} <iconify-icon icon="lucide:x"></iconify-icon></button>`; }).join("") + `</div>`;
  }
  if (prevTotal > 0) {
    const diff = thisTotal - prevTotal, pct = Math.round((diff / prevTotal) * 100), up = diff >= 0;
    chtml += `<div>지난달보다 <span class="${up ? "up" : "down"}">${up ? "▲" : "▼"} ${Math.abs(pct)}%</span></div>`;
  }
  cmp.innerHTML = chtml;
  cmp.querySelectorAll(".fchip").forEach((b) => b.onclick = () => { delete filters[b.dataset.fx]; render(); });

  // 집계 카드 — 겹쳐 쌓인 스택(스와이프). 우상단 필터 버튼 → 막대 숨기고 값별 토글
  const chipClass = (key, name) => {
    let c = "chip";
    if (key === "category") c += " cat";
    else if (key === "use") c += " use" + (name === "둘이" ? " together" : "");
    else if (key === "payer") c += " payer";
    else c += " tag";
    return c;
  };
  const isInc = (k, name) => !filters[k] || filters[k].includes(name);
  const deck = document.getElementById("bdDeck");
  deck.innerHTML = TAGDIMS.map((d) => {
    const fmode = filterModeAxis === d.key;
    const set = inMonth.filter((t) => matchF(t, d.key)); // 자기 축 제외(패싯)
    const map = {};
    for (const t of set) { const key = (t.tags && t.tags[d.key]) || "(없음)"; map[key] = (map[key] || 0) + signedAmount(t); }
    const rows = Object.entries(map).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
    const mx = rows.length ? rows[0][1] : 1;
    const body = rows.length ? rows.map(([name, v]) => {
      const cs = (d.style && d.style[name]) || {};
      const icon = cs.icon || (d.key === "category" ? (catIcon[name] || "lucide:tag") : "");
      const col = cs.color || "";
      const chip = `<span class="${chipClass(d.key, name)}"${col ? ` style="color:${esc(col)}"` : ""}>${iconHTML(icon)} ${esc(name)}</span>`;
      if (fmode) {
        const on = isInc(d.key, name);
        return `<div class="cat fm" data-fk="${esc(d.key)}" data-fv="${esc(name)}">
          <div class="row">${chip}<span class="amt">${fmt(v)} <span class="sw ${on ? "on" : ""}"></span></span></div>
        </div>`;
      }
      const dim = isInc(d.key, name) ? "" : " dim";
      return `<div class="cat${dim}">
        <div class="row">${chip}<span class="amt">${fmt(v)}</span></div>
        <div class="track"><div class="fill" style="width:${Math.max(4, (v / mx) * 100)}%${col ? `;background:${esc(col)}` : ""}"></div></div>
      </div>`;
    }).join("") : `<div class="empty">내역 없음</div>`;
    const active = !!filters[d.key];
    return `<div class="bdcard section">
      <div class="bdhead"><span class="bdtitle">${esc(d.label)}별</span>
        <button class="ftog ${fmode ? "on" : ""}${active ? " act" : ""}" data-ftog="${esc(d.key)}"><iconify-icon icon="lucide:${fmode ? "check" : "filter"}"></iconify-icon> ${fmode ? "완료" : "필터"}</button></div>
      ${body}</div>`;
  }).join("");
  deck.querySelectorAll("[data-ftog]").forEach((b) => b.onclick = (e) => { e.stopPropagation(); const k = b.dataset.ftog; filterModeAxis = filterModeAxis === k ? null : k; render(); });
  deck.querySelectorAll(".cat.fm").forEach((el) => el.onclick = () => {
    const k = el.dataset.fk, v = el.dataset.fv;
    const shown = [...el.parentElement.querySelectorAll(".cat.fm")].map((x) => x.dataset.fv);
    const inc = new Set(filters[k] || shown);
    if (inc.has(v)) inc.delete(v); else inc.add(v);
    if (shown.every((s) => inc.has(s))) delete filters[k]; else filters[k] = [...inc];
    render();
  });
  document.getElementById("bdDots").innerHTML = TAGDIMS.map((_, i) => `<span class="dot${i === deckActive ? " on" : ""}"></span>`).join("");
  requestAnimationFrame(layoutDeck);

  // 거래 내역 (필터 반영, 최신순, 날짜별 그룹)
  const sorted = [...filtered].sort((a, b) => new Date(b.when) - new Date(a.when));
  const list = document.getElementById("txList");
  if (!sorted.length) { list.innerHTML = `<div class="empty">이 달 거래가 없어요</div>`; return; }
  let html = ""; let lastDay = "";
  for (const t of sorted) {
    const k = kst(t.when);
    const dayKey = `${k.getUTCMonth() + 1}/${k.getUTCDate()}`;
    const wd = ["일","월","화","수","목","금","토"][k.getUTCDay()];
    if (dayKey !== lastDay) { html += `<div class="day">${dayKey} (${wd})</div>`; lastDay = dayKey; }
    const hh = String(k.getUTCHours()).padStart(2, "0");
    const mm = String(k.getUTCMinutes()).padStart(2, "0");
    const isCancel = t.status === "취소";
    const sign = isCancel ? "+" : "-";
    const card = cardOf(t);
    const metaBits = [`${hh}:${mm}`];
    if (t.source === "manual") metaBits.push("직접입력"); else metaBits.push((card && card.label) || t.cardName);
    if (t.memo) metaBits.push("📝 " + t.memo);
    const dot = card && card.color ? `<span class="cdot" style="background:${esc(card.color)}"></span>` : "";
    const chips = visibleDims().map((d) => {
      const val = t.tags && t.tags[d.key];
      if (!val) return "";
      const st = (d.style && d.style[val]) || {};
      let cls = "chip";
      if (d.key === "category") cls += " cat";
      else if (d.key === "use") cls += " use" + (val === "둘이" ? " together" : "");
      else if (d.key === "payer") cls += " payer";
      else cls += " tag";
      const togglable = d.values.length === 2;
      if (togglable) cls += " toggle";
      const icon = st.icon || (d.key === "category" ? (catIcon[val] || "lucide:circle-help") : "");
      const emo = iconHTML(icon);
      const swap = togglable ? `<span class="sw2">⇄</span>` : "";
      const colorStyle = st.color ? ` style="color:${esc(st.color)}"` : "";
      return `<span class="${cls}"${colorStyle}${togglable ? ` data-dim="${esc(d.key)}"` : ""}>${emo}${esc(val)}${swap}</span>`;
    }).join("");
    html += `
      <div class="tx ${isCancel ? "cancel" : ""}" data-id="${esc(t.id)}">
        <div class="left">
          <div class="m">${dot}${esc(t.merchant) || "(가맹점 미상)"}${isCancel ? '<span class="pill">취소</span>' : ""}${t.installment && t.installment !== "일시불" ? `<span class="pill">${esc(t.installment)}</span>` : ""}</div>
          <div class="meta">${metaBits.map(esc).join(" · ")}</div>
          <div class="chiprow">${chips}</div>
        </div>
        <div class="amt ${isCancel ? "refund" : ""}">${sign}${fmt(t.amount)}</div>
      </div>`;
  }
  list.innerHTML = html;
}

// 스택 카드 좌우 스와이프
(function attachSwipe() {
  const deck = document.getElementById("bdDeck");
  let sx = 0, sy = 0, drag = false, horiz = false, sup = 0;
  deck.addEventListener("pointerdown", (e) => { sx = e.clientX; sy = e.clientY; drag = true; horiz = false; });
  deck.addEventListener("pointermove", (e) => {
    if (!drag) return;
    if (!horiz && Math.abs(e.clientX - sx) > 10 && Math.abs(e.clientX - sx) > Math.abs(e.clientY - sy)) horiz = true;
  });
  deck.addEventListener("pointerup", (e) => {
    if (!drag) return; drag = false;
    const dx = e.clientX - sx;
    if (horiz && Math.abs(dx) > 40) {
      const n = deck.children.length;
      deckActive = dx < 0 ? Math.min(n - 1, deckActive + 1) : Math.max(0, deckActive - 1);
      layoutDeck();
      sup = Date.now();
    }
  });
  deck.addEventListener("click", (e) => { if (Date.now() - sup < 350) { e.stopPropagation(); e.preventDefault(); } }, true);
})();

// ---- 추가/편집 모달 ----
const modal = document.getElementById("modal");
let mType = "승인";
let editingId = null; // null=추가, 값=편집
let tagSel = {};      // 모달에서 고른 태그값 {key: value}  (""=자동/기본)
document.querySelectorAll("#segType button").forEach((b) => b.onclick = () => {
  mType = b.dataset.v;
  document.querySelectorAll("#segType button").forEach((x) => x.classList.toggle("on", x === b));
});

// 태그 축들을 모달에 동적으로 그림. storedTags=편집 대상의 명시 태그(없으면 자동/기본)
function buildTagControls(storedTags, isEdit) {
  tagSel = {};
  const cont = document.getElementById("tagControls");
  cont.innerHTML = "";
  for (const d of TAGDIMS) {
    const init = isEdit
      ? ((storedTags && storedTags[d.key]) || (d.infer ? "" : d.default))
      : (d.infer ? "" : d.default);
    tagSel[d.key] = init;
    const field = document.createElement("div");
    field.className = "field";
    const lab = document.createElement("label");
    lab.textContent = d.label + (d.infer ? " (비우면 자동분류)" : "");
    field.appendChild(lab);
    const opts = d.infer ? [["", "자동"]].concat(d.values.map((v) => [v, v])) : d.values.map((v) => [v, v]);
    if (opts.length <= 4) {
      const seg = document.createElement("div");
      seg.className = "seg";
      opts.forEach(([val, labl]) => {
        const b = document.createElement("button");
        b.type = "button"; b.textContent = labl;
        if (val === init) b.classList.add("on");
        b.onclick = () => { tagSel[d.key] = val; seg.querySelectorAll("button").forEach((x) => x.classList.remove("on")); b.classList.add("on"); };
        seg.appendChild(b);
      });
      field.appendChild(seg);
    } else {
      const sel = document.createElement("select");
      opts.forEach(([val, labl]) => { const o = document.createElement("option"); o.value = val; o.textContent = labl; if (val === init) o.selected = true; sel.appendChild(o); });
      sel.onchange = () => { tagSel[d.key] = sel.value; };
      field.appendChild(sel);
    }
    cont.appendChild(field);
  }
}

function openAddModal() {
  editingId = null;
  document.getElementById("mTitle").textContent = "직접 입력";
  document.getElementById("addFields").classList.remove("hidden");
  document.getElementById("mHeader").classList.add("hidden");
  document.getElementById("mDelete").classList.add("hidden");
  mType = "승인";
  document.querySelectorAll("#segType button").forEach((x) => x.classList.toggle("on", x.dataset.v === "승인"));
  document.getElementById("mMerchant").value = "";
  document.getElementById("mAmount").value = "";
  document.getElementById("mMemo").value = "";
  buildTagControls(null, false);
  const now = new Date(), pad = (n) => String(n).padStart(2, "0");
  document.getElementById("mWhen").value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

}

function openEditModal(tx) {
  editingId = tx.id;
  document.getElementById("mTitle").textContent = "거래 편집";
  document.getElementById("addFields").classList.add("hidden"); // 카드/문자건은 금액·날짜 고정
  const sign = tx.status === "취소" ? "+" : "-";
  document.getElementById("mHeader").innerHTML =
    `<div class="mh-m">${esc(tx.merchant) || "(가맹점 미상)"}</div>` +
    `<div class="mh-a">${sign}${fmt(tx.amount)} · ${tx.status}${tx.source === "manual" ? " · 직접입력" : (tx.cardName ? " · " + esc(tx.cardName) : "")}</div>`;
  document.getElementById("mHeader").classList.remove("hidden");
  buildTagControls(tx.tagsStored, true);
  document.getElementById("mMemo").value = tx.memo || "";
  document.getElementById("mDelete").classList.toggle("hidden", tx.source !== "manual"); // 삭제는 수기건만
  modal.classList.remove("hidden");
}

function closeModal() { modal.classList.add("hidden"); }
document.getElementById("fab").onclick = openAddModal;
document.getElementById("mCancel").onclick = closeModal;
modal.onclick = (e) => { if (e.target === modal) closeModal(); };

document.getElementById("mSave").onclick = async () => {
  const memo = document.getElementById("mMemo").value.trim();
  const tags = { ...tagSel }; // {key: value}  (""=자동/기본)
  if (editingId) {
    const r = await fetch("/api/update?token=" + encodeURIComponent(TOKEN), { method: "POST", body: JSON.stringify({ id: editingId, tags, memo }) });
    if (!r.ok) { alert("수정 실패"); return; }
  } else {
    const amount = document.getElementById("mAmount").value.trim();
    if (!amount) { alert("금액을 입력하세요"); return; }
    const whenLocal = document.getElementById("mWhen").value;
    const when = whenLocal ? new Date(whenLocal).toISOString() : new Date().toISOString();
    const merchant = document.getElementById("mMerchant").value.trim();
    const r = await fetch("/api/manual?token=" + encodeURIComponent(TOKEN), { method: "POST", body: JSON.stringify({ merchant, amount, when, status: mType, tags, memo }) });
    if (!r.ok) { alert("저장 실패"); return; }
  }
  closeModal();
  await load();
};

document.getElementById("mDelete").onclick = async () => {
  if (!editingId || !confirm("이 거래를 삭제할까요?")) return;
  await fetch("/api/delete?token=" + encodeURIComponent(TOKEN), { method: "POST", body: JSON.stringify({ id: editingId }) });
  closeModal();
  await load();
};

// 거래 탭 → 칩(2값)이면 즉시 토글, 아니면 편집 모달 (이벤트 위임)
document.getElementById("txList").addEventListener("click", async (e) => {
  const row = e.target.closest(".tx");
  if (!row) return;
  const tx = ALL.find((t) => t.id === row.dataset.id);
  if (!tx) return;
  const chip = e.target.closest(".chip.toggle");
  if (chip && chip.dataset.dim) {
    const d = dimByKey(chip.dataset.dim);
    if (d && d.values.length === 2) {
      const cur = (tx.tags && tx.tags[d.key]) || d.default;
      const next = d.values[(d.values.indexOf(cur) + 1) % 2];
      await fetch("/api/update?token=" + encodeURIComponent(TOKEN), { method: "POST", body: JSON.stringify({ id: tx.id, tags: { [d.key]: next } }) });
      await load();
      return;
    }
  }
  openEditModal(tx);
});

    document.getElementById("miLogout").onclick = () => { if (confirm("로그아웃할까요?")) { localStorage.removeItem("token"); location.reload(); } };
  } else if (settingsPage === "month") {
    body.innerHTML =
      `<p class="hint">매월 며칠을 한 달의 시작으로 볼지 정해요. 급여일(예: 25)로 맞추면 급여 기준 가계부가 됩니다. 1이면 일반 달력.</p>` +

      TAGDIMS.map((d) => `<div class="srow"><span>${esc(d.label)}</span><span class="sw ${chipVis[d.key] !== false ? "on" : ""}" data-vis="${esc(d.key)}"></span></div>`).join("") +

function renderCardsPage(body) {
  const names = [...new Set(ALL.filter((t) => t.source !== "manual" && t.cardName).map((t) => t.cardName))];
  const existing = APPCFG.cards || [];
  cardsDraft = names.map((nm) => { const e = existing.find((c) => c.match === nm) || {}; return { match: nm, label: e.label || "", color: e.color || "#6c8cff" }; });
  body.innerHTML = `<p class="hint">카드별 표시명·색을 정해요. 거래내역에 색점으로 구분돼요.</p><div id="cardList"></div>` +
    (cardsDraft.length ? `<div class="actions"><button class="btn-save" id="cardSave">저장</button></div>` : "");
  document.getElementById("cardList").innerHTML = cardsDraft.length ? cardsDraft.map((c, i) =>
    `<div class="axis-edit">` +
      `<div class="arow"><span class="cdot" style="background:${esc(c.color)}"></span><b style="font-size:13px">${esc(c.match)}</b></div>` +
      `<div class="arow"><span class="alabel">표시명</span><input data-i="${i}" data-f="label" value="${esc(c.label)}" placeholder="${esc(c.match)}"/></div>` +
      `<div class="arow"><span class="alabel">색</span><input type="color" data-i="${i}" data-f="color" value="${esc(c.color)}"/></div>` +
    `</div>`).join("") : `<div class="empty">표시할 카드가 없어요 (거래가 쌓이면 자동으로 나타나요)</div>`;
  document.querySelectorAll("#cardList input").forEach((inp) => {
    const ev = inp.type === "color" ? "onchange" : "oninput";
    inp[ev] = () => { cardsDraft[+inp.dataset.i][inp.dataset.f] = inp.value; if (inp.type === "color") renderCardsPage(body); };
  });
  if (cardsDraft.length) document.getElementById("cardSave").onclick = async () => {
    const r = await fetch("/api/appsettings?token=" + encodeURIComponent(TOKEN), { method: "POST", body: JSON.stringify({ cards: cardsDraft }) });
    if (!r.ok) { alert("저장 실패"); return; }
    settingsPage = "menu"; renderSettings(); await load();
  };
}

function renderAxisList() {
  const list = document.getElementById("axisList");
  list.innerHTML = "";
  axisDraft.forEach((ax, i) => {
    const box = document.createElement("div");
    box.className = "axis-edit";
    const infer = !!ax.infer;
    let h = `<div class="arow"><span class="alabel">이름</span>` +
      `<input data-i="${i}" data-f="label" value="${esc(ax.label || "")}" placeholder="예: 용도"/>` +
      (infer ? `<span class="locked">자동</span>` : `<button class="axdel" data-del="${i}">✕</button>`) + `</div>`;
    h += `<div class="vlabel">값 · 아이콘 · 색 (아이콘은 이모지 또는 <a href="https://icon-sets.iconify.design/lucide/" target="_blank">아이콘이름</a>)</div>`;
    ax.vals.forEach((vv, j) => {
      h += `<div class="vrow">` +
        `<input class="vname" data-i="${i}" data-j="${j}" data-f="v" value="${esc(vv.v)}" placeholder="값"/>` +
        `<input class="vicon" data-i="${i}" data-j="${j}" data-f="icon" value="${esc(vv.icon)}" placeholder="☕ 또는 lucide:coffee"/>` +
        `<input class="vcolor" type="color" data-i="${i}" data-j="${j}" data-f="color" value="${vv.color || "#888888"}"/>` +
        `<button class="axdel" data-vdel="${i}.${j}">✕</button></div>`;
    });
    h += `<button class="btn-addv" data-addv="${i}">+ 값 추가</button>`;
    h += `<div class="arow"><span class="alabel">기본값</span><select data-i="${i}" data-f="default">` +
      ax.vals.map((vv) => `<option value="${esc(vv.v)}" ${vv.v === ax.default ? "selected" : ""}>${esc(vv.v || "(빈값)")}</option>`).join("") + `</select></div>`;
    box.innerHTML = h;
    list.appendChild(box);
  });
  list.querySelectorAll("input").forEach((inp) => {
    const set = () => {
      const i = +inp.dataset.i, f = inp.dataset.f;
      if (inp.dataset.j !== undefined) axisDraft[i].vals[+inp.dataset.j][f] = inp.value;
      else axisDraft[i][f] = inp.value;
    };
    if (inp.type === "color") inp.onchange = set; else inp.oninput = set;
  });
  list.querySelectorAll("select").forEach((sel) => sel.onchange = () => { axisDraft[+sel.dataset.i].default = sel.value; });
  list.querySelectorAll("[data-del]").forEach((b) => b.onclick = () => { axisDraft.splice(+b.dataset.del, 1); renderAxisList(); });
  list.querySelectorAll("[data-vdel]").forEach((b) => b.onclick = () => { const [i, j] = b.dataset.vdel.split(".").map(Number); axisDraft[i].vals.splice(j, 1); renderAxisList(); });
  list.querySelectorAll("[data-addv]").forEach((b) => b.onclick = () => { axisDraft[+b.dataset.addv].vals.push({ v: "", icon: "", color: "" }); renderAxisList(); });
}
async function saveAxes() {
  const dims = [];
  for (const ax of axisDraft) {
    if (!ax.label || !ax.label.trim()) { alert("축 이름을 넣어주세요"); return; }
    const values = ax.vals.map((x) => (x.v || "").trim()).filter(Boolean);
    if (!values.length) { alert(`'${ax.label}' 축에 값이 필요해요`); return; }
    const style = {};
    ax.vals.forEach((x) => { const v = (x.v || "").trim(); const col = x.color && x.color.toLowerCase() !== "#888888" ? x.color : ""; if (v && (x.icon || col)) style[v] = { icon: x.icon || "", color: col }; });
    let def = ax.default; if (!values.includes(def)) def = values[values.length - 1];
    dims.push({ key: ax.key, label: ax.label.trim(), values, default: def, infer: !!ax.infer, style });
  }
  const r = await fetch("/api/tagdefs?token=" + encodeURIComponent(TOKEN), { method: "POST", body: JSON.stringify(dims) });
  if (!r.ok) { alert("저장 실패"); return; }
  settingsPage = "menu"; renderSettings();
  await load();
}

function showApp() { document.getElementById("login").classList.add("hidden"); document.getElementById("app").classList.remove("hidden"); document.getElementById("fab").classList.remove("hidden"); }
function showLogin() { document.getElementById("app").classList.add("hidden"); document.getElementById("login").classList.remove("hidden"); document.getElementById("fab").classList.add("hidden"); }

async function tryLogin(pw) {
  TOKEN = pw;
  try { await fetchData(); localStorage.setItem("token", TOKEN); showApp(); await load(); }
  catch (e) { TOKEN = ""; localStorage.removeItem("token"); document.getElementById("loginErr").textContent = "암호가 틀렸어요"; }
}
document.getElementById("loginBtn").onclick = () => tryLogin(document.getElementById("pw").value.trim());
document.getElementById("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(e.target.value.trim()); });

// 자동 로그인 시도
(async () => {
  if (TOKEN) { try { showApp(); await load(); } catch (e) { showLogin(); } }
  else showLogin();
})();

// 화면 다시 볼 때 새로고침
document.addEventListener("visibilitychange", () => { if (!document.hidden && TOKEN) load().catch(() => {}); });
</script>
