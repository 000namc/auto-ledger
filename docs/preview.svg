<svg xmlns="http://www.w3.org/2000/svg" width="380" height="720" viewBox="0 0 380 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <!-- phone frame -->
  <rect x="8" y="8" width="364" height="704" rx="42" fill="#0b0b0f" stroke="#2a2a35" stroke-width="2"/>
  <rect x="150" y="20" width="80" height="22" rx="11" fill="#16161d"/>

  <!-- top bar -->
  <circle cx="44" cy="66" r="11" fill="#e9c45a"/>
  <circle cx="44" cy="66" r="11" fill="none" stroke="#b8801f" stroke-width="1.5"/>
  <text x="62" y="71" fill="#f2f2f5" font-size="16" font-weight="700">우리 가계부</text>
  <rect x="312" y="52" width="30" height="28" rx="9" fill="#16161d" stroke="#2a2a35"/>
  <text x="327" y="71" fill="#8a8a96" font-size="14" text-anchor="middle">⚙</text>

  <!-- month nav -->
  <text x="36" y="108" fill="#8a8a96" font-size="20">‹</text>
  <text x="190" y="109" fill="#f2f2f5" font-size="16" font-weight="700" text-anchor="middle">2026년 6월</text>
  <text x="338" y="108" fill="#8a8a96" font-size="20" text-anchor="end">›</text>

  <!-- total card -->
  <rect x="24" y="122" width="332" height="104" rx="18" fill="#16161d"/>
