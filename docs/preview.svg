  <text x="190" y="188" fill="#f2f2f5" font-size="34" font-weight="800" text-anchor="middle">412,300원</text>
  <text x="190" y="212" fill="#8a8a96" font-size="12" text-anchor="middle">지난달보다 <tspan fill="#5ad19a">▼ 12%</tspan></text>

  <!-- breakdown card -->
  <rect x="24" y="240" width="332" height="178" rx="18" fill="#16161d"/>
  <text x="44" y="266" fill="#8a8a96" font-size="13" font-weight="700">카테고리별</text>

  <!-- cat 1 -->
  <rect x="44" y="278" width="78" height="22" rx="9" fill="none" stroke="#6c8cff" stroke-opacity="0.5"/>
  <text x="54" y="293" fill="#6c8cff" font-size="12">🍚 식비</text>
  <text x="336" y="293" fill="#8a8a96" font-size="12" text-anchor="end">182,000원</text>
  <rect x="44" y="306" width="292" height="7" rx="3.5" fill="#1e1e27"/>
  <rect x="44" y="306" width="292" height="7" rx="3.5" fill="#6c8cff"/>

  <!-- cat 2 -->
  <rect x="44" y="324" width="96" height="22" rx="9" fill="none" stroke="#6c8cff" stroke-opacity="0.5"/>
  <text x="54" y="339" fill="#6c8cff" font-size="12">☕ 카페/간식</text>
  <text x="336" y="339" fill="#8a8a96" font-size="12" text-anchor="end">88,000원</text>
  <rect x="44" y="352" width="292" height="7" rx="3.5" fill="#1e1e27"/>
  <rect x="44" y="352" width="141" height="7" rx="3.5" fill="#6c8cff"/>

  <!-- cat 3 -->
  <rect x="44" y="370" width="70" height="22" rx="9" fill="none" stroke="#6c8cff" stroke-opacity="0.5"/>
  <text x="54" y="385" fill="#6c8cff" font-size="12">🛒 쇼핑</text>
  <text x="336" y="385" fill="#8a8a96" font-size="12" text-anchor="end">52,400원</text>
  <rect x="44" y="398" width="292" height="7" rx="3.5" fill="#1e1e27"/>
  <rect x="44" y="398" width="84" height="7" rx="3.5" fill="#6c8cff"/>

  <!-- tx list card -->
  <rect x="24" y="432" width="332" height="222" rx="18" fill="#16161d"/>
  <text x="44" y="458" fill="#8a8a96" font-size="13" font-weight="700">거래 내역</text>
  <text x="336" y="458" fill="#8a8a96" font-size="10" text-anchor="end">카테고리 / 용도 / 결제자</text>

  <!-- tx 1 -->
  <text x="44" y="486" fill="#f2f2f5" font-size="15" font-weight="600">스타벅스 강남</text>
  <text x="336" y="486" fill="#f2f2f5" font-size="15" font-weight="700" text-anchor="end">-5,800원</text>
  <rect x="44" y="496" width="86" height="20" rx="8" fill="none" stroke="#6c8cff" stroke-opacity="0.5"/>
  <text x="52" y="510" fill="#6c8cff" font-size="11">☕ 카페/간식</text>
  <rect x="136" y="496" width="46" height="20" rx="8" fill="none" stroke="#6ad1a0" stroke-opacity="0.6"/>
  <text x="144" y="510" fill="#6ad1a0" font-size="11">둘이 ⇄</text>
  <rect x="188" y="496" width="40" height="20" rx="8" fill="none" stroke="#d08cff" stroke-opacity="0.6"/>
  <text x="196" y="510" fill="#d08cff" font-size="11">나 ⇄</text>

  <line x1="44" y1="532" x2="336" y2="532" stroke="#2a2a35"/>

  <!-- tx 2 -->
  <text x="44" y="560" fill="#f2f2f5" font-size="15" font-weight="600">쿠팡</text>
  <text x="336" y="560" fill="#f2f2f5" font-size="15" font-weight="700" text-anchor="end">-23,900원</text>
  <rect x="44" y="570" width="62" height="20" rx="8" fill="none" stroke="#6c8cff" stroke-opacity="0.5"/>
  <text x="52" y="584" fill="#6c8cff" font-size="11">🛒 쇼핑</text>
  <rect x="112" y="570" width="46" height="20" rx="8" fill="none" stroke="#e0c060" stroke-opacity="0.6"/>
  <text x="120" y="584" fill="#e0c060" font-size="11">혼자 ⇄</text>
  <rect x="164" y="570" width="58" height="20" rx="8" fill="none" stroke="#d08cff" stroke-opacity="0.6"/>
  <text x="172" y="584" fill="#d08cff" font-size="11">파트너 ⇄</text>

  <line x1="44" y1="606" x2="336" y2="606" stroke="#2a2a35"/>

  <!-- tx 3 -->
  <text x="44" y="634" fill="#f2f2f5" font-size="15" font-weight="600">GS25 역삼점</text>
  <text x="336" y="634" fill="#f2f2f5" font-size="15" font-weight="700" text-anchor="end">-4,200원</text>

  <!-- FAB -->
  <rect x="138" y="664" width="104" height="40" rx="20" fill="#6c8cff"/>
  <text x="190" y="689" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">+ 직접 입력</text>
</svg>
